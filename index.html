<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starmakerwm.com - Music Tracks, Events & Competitions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-color: #667eea;
            --secondary-color: #764ba2;
            --accent-color: #ff6b6b;
            --light-bg: #f9f9f9;
            --dark-bg: #1a1a1a;
            --transition: all 0.3s ease;
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            line-height: 1.6;
            background-color: #fff;
        }
        
        /* Navigation */
        nav {
            background-color: var(--dark-bg);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        nav .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
        }
        
        nav .logo {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--accent-color);
            transition: var(--transition);
        }
        
        nav .logo:hover {
            transform: scale(1.05);
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 2.5rem;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            transition: var(--transition);
            font-weight: 500;
            position: relative;
        }
        
        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }
        
        nav a:hover {
            color: var(--accent-color);
        }
        
        nav a:hover::after {
            width: 100%;
        }
        
        /* Header/Hero Section */
        header {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            text-align: center;
            padding: 6rem 2rem;
            position: relative;
            overflow: hidden;
            animation: slideInDown 0.8s ease;
        }
        
        @keyframes slideInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.2);
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.3; }
        }
        
        header .header-content {
            position: relative;
            z-index: 2;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header img {
            max-width: 150px;
            height: auto;
            margin-bottom: 1.5rem;
            animation: bounce 2s ease-in-out infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        header h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        header p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0.95;
        }
        
        .cta-button {
            background-color: var(--accent-color);
            color: white;
            padding: 0.8rem 2.5rem;
            border: 2px solid transparent;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: inline-block;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }
        
        .cta-button:hover {
            background-color: #ff5252;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }
        
        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        
        section {
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        /* About Us Section */
        .about-section {
            background: linear-gradient(135deg, var(--light-bg) 0%, white 100%);
            padding: 5rem 2rem;
        }
        
        .about-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }
        
        .about-text h2 {
            font-size: 2.8rem;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
            position: relative;
            inline-size: fit-content;
        }
        
        .about-text h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 60px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 2px;
        }
        
        .about-text p {
            margin-bottom: 1.2rem;
            font-size: 1.05rem;
            line-height: 1.9;
            color: #555;
        }
        
        .about-highlights {
            margin-top: 2rem;
            padding: 2rem;
            background-color: white;
            border-left: 5px solid var(--accent-color);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        .about-highlights h3 {
            color: var(--accent-color);
            margin-bottom: 1.2rem;
            font-size: 1.3rem;
        }
        
        .about-highlights ul {
            list-style: none;
        }
        
        .about-highlights li {
            padding: 0.8rem 0;
            padding-left: 2rem;
            position: relative;
            transition: var(--transition);
        }
        
        .about-highlights li:hover {
            transform: translateX(10px);
        }
        
        .about-highlights li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: var(--accent-color);
            font-weight: bold;
            font-size: 1.3rem;
        }
        
        /* Services Section */
        .services-section {
            padding: 5rem 2rem;
            background-color: white;
        }
        
        .services-section h2 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 1rem;
            color: var(--primary-color);
            position: relative;
        }
        
        .services-section > p {
            text-align: center;
            color: #666;
            margin-bottom: 3rem;
            font-size: 1.05rem;
        }
        
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .service-card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
            transition: var(--transition);
            border-top: 4px solid var(--primary-color);
            position: relative;
            overflow: hidden;
        }
        
        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: -1;
        }
        
        .service-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.3);
            border-top-color: var(--accent-color);
        }
        
        .service-card:hover::before {
            opacity: 1;
        }
        
        .service-card h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            font-size: 1.6rem;
        }
        
        .service-card p {
            color: #666;
            line-height: 1.8;
        }
        
        /* Video Section */
        .video-section {
            padding: 5rem 2rem;
            background: linear-gradient(135deg, var(--light-bg) 0%, white 100%);
        }
        
        .video-section h2 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 3rem;
            color: var(--primary-color);
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .video-card {
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: var(--transition);
            cursor: pointer;
        }
        
        .video-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        
        .video-thumbnail {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background-color: #000;
            overflow: hidden;
        }
        
        .video-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition);
        }
        
        .video-card:hover .video-thumbnail img {
            transform: scale(1.1);
        }
        
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            transition: var(--transition);
            z-index: 10;
        }
        
        .video-card:hover .play-button {
            background-color: #ff5252;
            transform: translate(-50%, -50%) scale(1.2);
        }
        
        .video-info {
            padding: 1.5rem;
        }
        
        .video-info h3 {
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }
        
        .video-info p {
            color: #666;
            font-size: 0.95rem;
        }
        
        /* News/Tweets Section */
        .news-section {
            padding: 5rem 2rem;
            background-color: white;
        }
        
        .news-section h2 {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 3rem;
            color: var(--primary-color);
        }
        
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .news-card {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: var(--transition);
            border-left: 5px solid var(--primary-color);
            position: relative;
        }
        
        .news-card:hover {
            transform: translateX(10px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
            border-left-color: var(--accent-color);
        }
        
        .news-date {
            color: var(--accent-color);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .news-card h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
            font-size: 1.3rem;
            line-height: 1.5;
        }
        
        .news-card p {
            color: #666;
            line-height: 1.7;
            margin-bottom: 1rem;
        }
        
        .news-tag {
            display: inline-block;
            background-color: var(--light-bg);
            color: var(--primary-color);
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            transition: var(--transition);
        }
        
        .news-tag:hover {
            background-color: var(--primary-color);
            color: white;
        }
        
        /* Promotion Section */
        .promotion {
            background: linear-gradient(135deg, white 0%, var(--light-bg) 100%);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 3rem;
            border-top: 4px solid var(--primary-color);
        }
        
        .promotion h2 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-size: 2rem;
        }
        
        .promotion p {
            color: #555;
            margin-bottom: 1rem;
            line-height: 1.8;
        }
        
        .promotion a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }
        
        .promotion a:hover {
            color: #ff5252;
            text-decoration: underline;
        }
        
        .draws-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin: 2rem 0;
        }
        
        .draw {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            padding: 2rem;
            border-radius: 12px;
            color: white;
            text-align: center;
            transition: var(--transition);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }
        
        .draw:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5);
        }
        
        .draw h3 {
            margin-bottom: 1rem;
            font-size: 1.4rem;
        }
        
        .draw p {
            margin: 0.8rem 0;
            font-size: 1rem;
        }
        
        /* Join Section */
        .join-section {
            background: linear-gradient(135deg, var(--accent-color) 0%, #ff8e72 100%);
            color: white;
            text-align: center;
            padding: 4rem 2rem;
            border-radius: 12px;
            margin: 3rem 0;
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.3);
        }
        
        .join-section h2 {
            font-size: 2.3rem;
            margin-bottom: 1rem;
        }
        
        .join-section p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            opacity: 0.95;
        }
        
        /* Footer */
        footer {
            background-color: var(--dark-bg);
            color: white;
            text-align: center;
            padding: 3rem 2rem;
            border-top: 3px solid var(--primary-color);
        }
        
        footer p {
            margin: 0.8rem 0;
            opacity: 0.9;
        }
        
        footer a {
            color: var(--accent-color);
            text-decoration: none;
            transition: var(--transition);
        }
        
        footer a:hover {
            text-decoration: underline;
        }
        
        /* Scroll-to-top Button */
        .scroll-top {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: var(--primary-color);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 50;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .scroll-top.active {
            opacity: 1;
            visibility: visible;
        }
        
        .scroll-top:hover {
            background-color: var(--accent-color);
            transform: translateY(-3px);
        }
        
        /* Responsive Design */
        @media (max-width: 1024px) {
            .about-content {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 2.5rem;
            }
            
            .services-section h2,
            .video-section h2,
            .news-section h2 {
                font-size: 2.2rem;
            }
        }
        
        @media (max-width: 768px) {
            header {
                padding: 4rem 1rem;
            }
            
            header h1 {
                font-size: 2rem;
            }
            
            header p {
                font-size: 1.1rem;
            }
            
            nav ul {
                flex-direction: column;
                gap: 1rem;
            }
            
            nav .nav-container {
                padding: 0 1rem;
            }
            
            .about-text h2,
            .services-section h2,
            .video-section h2,
            .news-section h2 {
                font-size: 1.8rem;
            }
            
            .container {
                padding: 1.5rem;
            }
            
            .about-section,
            .services-section,
            .video-section,
            .news-section {
                padding: 3rem 1rem;
            }
            
            .service-card,
            .video-card,
            .news-card {
                padding: 1.5rem;
            }
            
            .promotion {
                padding: 2rem;
            }
            
            .scroll-top {
                width: 45px;
                height: 45px;
                bottom: 20px;
                right: 20px;
            }
        }
        
        /* Blog Section */
        .blog-section {
            padding: 5rem 2rem;
            background: linear-gradient(135deg, white 0%, var(--light-bg) 100%);
        }
        
        .blog-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .blog-header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }
        
        .blog-header h2 {
            font-size: 2.8rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        
        .blog-header p {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        
        .btn-new-post {
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            display: inline-block;
        }
        
        .btn-new-post:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .btn-new-post:active {
            transform: translateY(-1px);
        }
        
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
        }
        
        .blog-card {
            background-color: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            animation: slideUp 0.6s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .blog-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.2);
        }
        
        .blog-card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
        }
        
        .blog-card-body {
            padding: 1.8rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }
        
        .blog-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }
        
        .blog-card-category {
            display: inline-block;
            background-color: var(--light-bg);
            color: var(--primary-color);
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .blog-card-date {
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        
        .blog-card h3 {
            color: var(--primary-color);
            font-size: 1.4rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        
        .blog-card p {
            color: #666;
            line-height: 1.7;
            margin-bottom: 1rem;
            flex-grow: 1;
        }
        
        .blog-card-author {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }
        
        .blog-card-footer {
            display: flex;
            gap: 0.8rem;
            justify-content: space-between;
        }
        
        .btn-read-more {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            flex-grow: 1;
        }
        
        .btn-read-more:hover {
            background-color: var(--secondary-color);
        }
        
        .btn-edit,
        .btn-delete {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 0.6rem 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            font-size: 0.9rem;
        }
        
        .btn-edit:hover {
            background-color: var(--primary-color);
            color: white;
        }
        
        .btn-delete:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }
        
        .no-posts {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: #999;
        }
        
        .no-posts i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.3;
        }
        
        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            animation: fadeIn 0.3s ease;
        }
        
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);

    <script>
        // Blog Posts Management
        class BlogManager {
            constructor() {
                this.posts = JSON.parse(localStorage.getItem('smwm_posts')) || [];
                this.modal = document.getElementById('postModal');
                this.editModal = document.getElementById('editModal');
                this.blogGrid = document.getElementById('blogGrid');
                this.editingPostId = null;
                this.init();
            }
            
            init() {
                // Event Listeners for Create Post
                document.getElementById('btnNewPost').addEventListener('click', () => this.openModal());
                document.getElementById('closeModal').addEventListener('click', () => this.closeModal());
                document.getElementById('cancelBtn').addEventListener('click', () => this.closeModal());
                document.getElementById('postForm').addEventListener('submit', (e) => this.handleSubmit(e));
                
                // Event Listeners for Edit Post
                document.getElementById('closeEditModal').addEventListener('click', () => this.closeEditModal());
                document.getElementById('cancelEditBtn').addEventListener('click', () => this.closeEditModal());
                document.getElementById('editForm').addEventListener('submit', (e) => this.handleEditSubmit(e));
                
                // Image upload preview
                document.getElementById('postImage').addEventListener('change', (e) => this.previewImage(e));
                
                // Close modal when clicking outside
                window.addEventListener('click', (e) => {
                    if (e.target === this.modal) this.closeModal();
                    if (e.target === this.editModal) this.closeEditModal();
                });
                
                this.render();
            }
            
            openModal() {
                this.modal.classList.add('show');
                document.getElementById('postForm').reset();
                document.getElementById('imagePreview').style.display = 'none';
            }
            
            closeModal() {
                this.modal.classList.remove('show');
            }
            
            openEditModal(postId) {
                const post = this.posts.find(p => p.id === postId);
                if (post) {
                    this.editingPostId = postId;
                    document.getElementById('editTitle').value = post.title;
                    document.getElementById('editCategory').value = post.category;
                    document.getElementById('editContent').value = post.content;
                    this.editModal.classList.add('show');
                }
            }
            
            closeEditModal() {
                this.editModal.classList.remove('show');
                this.editingPostId = null;
            }
            
            previewImage(e) {
                const file = e.target.files[0];
                const preview = document.getElementById('imagePreview');
                const reader = new FileReader();
                
                reader.onload = (event) => {
                    preview.src = event.target.result;
                    preview.style.display = 'block';
                };
                
                if (file) {
                    reader.readAsDataURL(file);
                }
            }
            
            handleSubmit(e) {
                e.preventDefault();
                
                const title = document.getElementById('postTitle').value;
                const content = document.getElementById('postContent').value;
                const category = document.getElementById('postCategory').value;
                const author = document.getElementById('postAuthor').value || 'Anonymous';
                const image = document.getElementById('imagePreview').src;
                
                const post = {
                    id: Date.now(),
                    title,
                    content,
                    category,
                    author,
                    image,
                    date: new Date().toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric'
                    })
                };
                
                this.posts.unshift(post);
                this.save();
                this.render();
                this.closeModal();
                
                // Show success message
                this.showNotification('✅ Post published successfully!');
            }
            
            handleEditSubmit(e) {
                e.preventDefault();
                
                const post = this.posts.find(p => p.id === this.editingPostId);
                if (post) {
                    post.title = document.getElementById('editTitle').value;
                    post.content = document.getElementById('editContent').value;
                    post.category = document.getElementById('editCategory').value;
                    
                    this.save();
                    this.render();
                    this.closeEditModal();
                    this.showNotification('✅ Post updated successfully!');
                }
            }
            
            deletePost(postId) {
                if (confirm('Are you sure you want to delete this post?')) {
                    this.posts = this.posts.filter(p => p.id !== postId);
                    this.save();
                    this.render();
                    this.showNotification('🗑️ Post deleted');
                }
            }
            
            viewPost(postId) {
                const post = this.posts.find(p => p.id === postId);
                if (post) {
                    this.showPostPreview(post);
                }
            }
            
            showPostPreview(post) {
                const modal = document.createElement('div');
                modal.className = 'post-preview-modal show';
                modal.innerHTML = `
                    <div class="post-preview-content">
                        <div class="post-preview-header">
                            <span style="cursor: pointer; font-size: 2rem; color: white;" onclick="this.parentElement.parentElement.parentElement.remove();">&times;</span>
                            <h1>${post.title}</h1>
                            <div class="post-preview-meta">
                                <span>📅 ${post.date}</span>
                                <span>✍️ ${post.author}</span>
                                <span>📌 ${post.category}</span>
                            </div>
                        </div>
                        <div class="post-preview-body">
                            ${post.image ? `<img src="${post.image}" alt="${post.title}">` : ''}
                            ${post.content.split('\n').map(para => `<p>${para}</p>`).join('')}
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) modal.remove();
                });
            }
            
            showNotification(message) {
                const notification = document.createElement('div');
                notification.style.cssText = `
                    position: fixed;
                    top: 20px;
                    right: 20px;
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    color: white;
                    padding: 1rem 2rem;
                    border-radius: 8px;
                    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
                    z-index: 2000;
                    animation: slideInRight 0.3s ease;
                    font-weight: 600;
                    max-width: 300px;
                `;
                notification.textContent = message;
                document.body.appendChild(notification);
                
                setTimeout(() => {
                    notification.style.animation = 'slideOutRight 0.3s ease forwards';
                    setTimeout(() => notification.remove(), 300);
                }, 3000);
            }
            
            save() {
                localStorage.setItem('smwm_posts', JSON.stringify(this.posts));
            }
            
            render() {
                if (this.posts.length === 0) {
                    this.blogGrid.innerHTML = `
                        <div class="no-posts">
                            <i class="fas fa-pen-fancy"></i>
                            <p>No posts yet. Be the first to create one!</p>
                        </div>
                    `;
                    return;
                }
                
                this.blogGrid.innerHTML = this.posts.map(post => `
                    <div class="blog-card">
                        ${post.image ? `<img src="${post.image}" alt="${post.title}" class="blog-card-image">` : 
                          `<div class="blog-card-image">${this.getCategoryIcon(post.category)}</div>`}
                        <div class="blog-card-body">
                            <div class="blog-card-header">
                                <span class="blog-card-category">${post.category}</span>
                            </div>
                            <div class="blog-card-date">📅 ${post.date}</div>
                            <h3>${post.title}</h3>
                            <p>${post.content.substring(0, 150)}${post.content.length > 150 ? '...' : ''}</p>
                            <div class="blog-card-author">✍️ By ${post.author}</div>
                            <div class="blog-card-footer">
                                <button class="btn-read-more" onclick="blogManager.viewPost(${post.id})">
                                    Read Full Post
                                </button>
                                <button class="btn-edit" onclick="blogManager.openEditModal(${post.id})">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn-delete" onclick="blogManager.deletePost(${post.id})">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            
            getCategoryIcon(category) {
                const icons = {
                    'Music': '🎵',
                    'News': '📰',
                    'Event': '🎤',
                    'Tutorial': '📚',
                    'Other': '📌'
                };
                return icons[category] || '📝';
            }
        }
        
        // Initialize Blog Manager
        const blogManager = new BlogManager();
        
        // Add animation styles dynamically
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideInRight {
                from {
                    opacity: 0;
                    transform: translateX(100px);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
            
            @keyframes slideOutRight {
                from {
                    opacity: 1;
                    transform: translateX(0);
                }
                to {
                    opacity: 0;
                    transform: translateX(100px);
                }
            }
        `;
        document.head.appendChild(style);
        
        // Smooth scrolling for navigation links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
        
        // Scroll to Top Button Functionality
        const scrollTopBtn = document.getElementById('scrollTop');
        
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                scrollTopBtn.classList.add('active');
            } else {
                scrollTopBtn.classList.remove('active');
            }
        });
        
        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
        
        // Video cards click animation
        document.querySelectorAll('.video-card').forEach(card => {
            card.addEventListener('click', function() {
                alert('Video player would open here. For production, integrate a real video player.');
            });
        });
        
        // Add animation on scroll
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };
        
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.animation = 'fadeIn 0.8s ease forwards';
                }
            });
        }, observerOptions);
        
        document.querySelectorAll('section').forEach(section => {
            observer.observe(section);
        });
    </script>
</body>
</html>
